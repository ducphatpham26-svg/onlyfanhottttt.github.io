<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đăng ký tài khoản</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="form-box">
    <h2>Đăng ký tài khoản</h2>

    <input type="text" placeholder="Tài khoản" id="user">
    <input type="password" placeholder="Mật khẩu" id="pass">

    <button id="confirmBtn" class="btn">Xác nhận</button>

    <div class="loading-box" id="loadingBox">
      <div class="loading-bar" id="loadingBar"></div>
      <span id="loadingText">0%</span>
    </div>
  </div>

  <button id="napBtn" class="nap">Nạp tiền</button>

  <script src="script.js"></script>
</body>
</html>
